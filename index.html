<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Ruba ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Cairo', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

/* 🎥 الفيديو */
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-3;
}

/* طبقة غامقة */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:-2;
}

/* الصندوق */
.box{
    text-align:center;
    color:white;
    padding:25px;
    width:90%;
    max-width:700px;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.2);
}

/* typing */
.typing{
    font-size:28px;
    line-height:1.8;
    min-height:180px;
    white-space:pre-line;
}

/* glow اسم */
.name{
    margin-top:20px;
    font-size:42px;
    color:#ffd6e0;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #ff4d6d;
    }
    to{
        text-shadow:0 0 25px #ff4d6d,0 0 45px #ff4d6d;
    }
}

/* القلوب */
.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:float 7s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    10%{opacity:1;}
    100%{
        transform:translateY(-120vh) scale(1.3);
        opacity:0;
    }
}

/* زر الموسيقى */
#playBtn{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 0 20px #ff4d6d;
    z-index:10;
}
</style>
</head>

<body>

<!-- 🎥 الفيديو -->
<video autoplay loop playsinline>
    <source src="https://drive.google.com/uc?export=download&id=1XyQsoXrzNqFppb6QBWRNspfQwIHi0u7k" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="box">
    <div class="typing" id="text"></div>
    <div class="name">Ruba ❤️</div>
</div>

<!-- 🎧 الأغنية -->
<audio loop id="bgMusic">
    <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- زر -->
<button id="playBtn">🎵 اضغط هون لتشتغل الأغنية</button>

<script>

/* typing */
const message = `ما كنت صدّق
إنو شخص ممكن يغيّر يوم كامل بابتسامة...

لحد ما عرفتك يا رُبى 🤍

ومن وقتها...
صار كل شي أهدى،
وأحلى،
وإلو معنى ✨`;

let i = 0;
const text = document.getElementById("text");

function typeWriter(){
    if(i < message.length){
        text.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 60);
    }
}
typeWriter();

/* قلوب */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100+"%";
    heart.style.fontSize = (Math.random()*20+15)+"px";
    heart.style.animationDuration = (Math.random()*3+5)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),7000);
}

setInterval(createHeart,400);

/* تشغيل الأغنية */
const btn = document.getElementById("playBtn");
const audio = document.getElementById("bgMusic");

btn.addEventListener("click", ()=>{
    audio.play();
    btn.innerHTML = "❤️ بحبك";
});
</script>

</body>
</html>
