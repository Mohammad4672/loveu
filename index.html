<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Ruba ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Cairo', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;

    /* 🌌 خلفية جديدة */
    background: radial-gradient(circle at top,#1b1b2f,#16213e,#0f3460,#000);
}

/* 💖 الصندوق */
.box{
    text-align:center;
    color:white;
    padding:25px;
    width:90%;
    max-width:700px;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.2);
}

/* ✍️ typing */
.typing{
    font-size:28px;
    line-height:1.8;
    min-height:180px;
    white-space:pre-line;
    letter-spacing:0.5px;
}

/* 💖 الاسم */
.name{
    margin-top:20px;
    font-size:42px;
    color:#ffd6e0;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #ff4d6d; }
    to{ text-shadow:0 0 25px #ff4d6d,0 0 45px #ff4d6d; }
}

/* ❤️ القلوب */
.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:float 7s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh) scale(0.5);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(-120vh) scale(1.3);opacity:0;}
}

/* 🎵 زر */
#playBtn{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 0 20px #ff4d6d;
}
</style>
</head>

<body>

<div class="box">
    <div class="typing" id="text"></div>
    <div class="name">Ruba ❤️</div>
</div>

<!-- 🎧 الموسيقى -->
<audio id="bgMusic" loop>
    <source src="song.mp3.mp3" type="audio/mpeg">
</audio>

<!-- 🎵 زر -->
<button id="playBtn">🎵 اكبسي هون يا قلبي</button>

<script>

/* ✍️ typing */
const message = `25/04/2025 …
الساعة3:21 كانت احلى لحظة بحياتي
وكأن الحياة قررت فجأة
تعطيني احلا شي بالدنيا،
لما عرّفتني عليكي يا رُبى 🤍
ما بعرف كيف كنت قبل،
بس بعرف منيح كيف صرت وقت عرفتك…
صرت حبك،
أضعف قدامك،
وأقوى بحبك بنفس الوقت ✨
إنتِ مش بس مرور…
إنتِ الحكاية اللي بلّشت وما بدي ياها تنتهي 💖
وإذا كان في شي اسمه قدر..
فأنا بشكر القدر لأنو عرفني عليكي 🤍`;

let i = 0;
const text = document.getElementById("text");

function typeWriter(){
    if(i < message.length){
        text.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 45);
    }
}

setTimeout(typeWriter, 600);

/* ❤️ قلوب */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "%";
    heart.style.fontSize = (15 + Math.random()*20) + "px";
    heart.style.animationDuration = (5 + Math.random()*3) + "s";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),7000);
}
setInterval(createHeart,400);

/* 🎵 تشغيل الموسيقى */
const btn = document.getElementById("playBtn");
const audio = document.getElementById("bgMusic");

btn.addEventListener("click", async ()=>{
    try{
        await audio.play();
        btn.innerHTML = "❤️ بحبك";
    }catch(e){
        alert("في مشكلة بالصوت 😭");
    }
});

</script>

</body>
</html>
