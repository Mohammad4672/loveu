<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Ruba ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:'Cairo', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#1b1b2f,#16213e,#0f3460,#000);
    color:white;
}

/* 🌹 اسم Ruba (زر) */
#rubaBtn{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:40px;
    color:#ffd6e0;
    text-shadow:0 0 15px #ff4d6d;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

#rubaBtn:hover{
    transform:translateX(-50%) scale(1.1);
    text-shadow:0 0 25px #ff4d6d,0 0 45px #ff4d6d;
}

/* 💖 box */
.box{
    text-align:center;
    padding:25px;
    width:90%;
    max-width:700px;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.2);
}

/* ✍️ typing */
.typing{
    font-size:28px;
    line-height:1.8;
    min-height:180px;
    white-space:pre-line;
}

/* 🎬 hint */
.hint{
    position:fixed;
    bottom:20px;
    font-size:14px;
    opacity:0.6;
}
</style>
</head>

<body>

<div id="rubaBtn">Ruba ❤️</div>

<div class="box">
    <div class="typing" id="text"></div>
</div>

<div class="hint">اكبس على اسم Ruba لتشغيل الموسيقى 🎵</div>

<audio id="music" loop>
    <source src="song.mp3.mp3" type="audio/mpeg">
</audio>

<script>

const message = `25/04/2025…
الساعة 3:21 كانت لحظة مختلفة…
وكأن الحياة قررت فجأة
تكتب بداية جديدة بحياتي 🤍
لما عرّفتني عليكي يا رُبى…
ما عاد في شي مثل قبل،
صار في شعور ما بينوصف ✨
صرت أضعف قدامك،
وأقوى بحبك بنفس الوقت…
إنتِ مش بس مرور…
إنتِ الحكاية اللي ما بدي نهايتها تخلص 💖
وهلق يا قلبي بدي ياكي تكبسي على اسمك فوق 🤍`;

let i=0;
const text=document.getElementById("text");
const music=document.getElementById("music");

/* ✍️ typing */
function typeWriter(){
    if(i < message.length){
        text.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter,55);
    }
}

typeWriter();

/* 🎵 تشغيل الموسيقى عند الضغط على الاسم */
const btn=document.getElementById("rubaBtn");

btn.addEventListener("click", async ()=>{

    music.volume=0;

    try{
        await music.play();

        let v=0;
        let fade=setInterval(()=>{
            if(v<0.6){
                v+=0.03;
                music.volume=v;
            }else{
                clearInterval(fade);
            }
        },150);

        btn.innerHTML="💖 بحبك Ruba";

    }catch(e){
        alert("اضغط مرة ثانية إذا ما اشتغل الصوت 👆");
    }

});

</script>

</body>
</html>
