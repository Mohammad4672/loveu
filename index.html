<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Ruba ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Cairo', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#1b1b2f,#16213e,#0f3460,#000);
}

/* 💖 الاسم فوق */
.top-name{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:40px;
    color:#ffd6e0;
    font-weight:bold;
    text-shadow:0 0 15px #ff4d6d;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #ff4d6d; }
    to{ text-shadow:0 0 25px #ff4d6d,0 0 45px #ff4d6d; }
}

/* 💖 الصندوق */
.box{
    text-align:center;
    color:white;
    padding:25px;
    width:90%;
    max-width:700px;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.2);
}

/* ✍️ typing */
.typing{
    font-size:28px;
    line-height:1.8;
    min-height:180px;
    white-space:pre-line;
    letter-spacing:0.5px;
}

/* ❤️ قلوب */
.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:float 7s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh) scale(0.5);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(-120vh) scale(1.3);opacity:0;}
}
</style>
</head>

<body>

<div class="top-name">Ruba ❤️</div>

<div class="box">
    <div class="typing" id="text"></div>
</div>

<audio id="bgMusic" loop>
    <source src="song.mp3.mp3" type="audio/mpeg">
</audio>

<script>

const textEl = document.getElementById("text");
const audio = document.getElementById("bgMusic");

let i = 0;
let musicStarted = false;

/* 💖 الرسالة */
const message = `25/04/2025…
الساعة 3:21 كانت لحظة مختلفة…

وكأن الحياة قررت فجأة
تكتب بداية جديدة بحياتي 🤍
لما عرّفتني عليكي يا رُبى…
ما عاد في شي مثل قبل،
صار في شعور ما بينوصف ✨
صرت أضعف قدامك،
وأقوى بحبك بنفس الوقت…
إنتِ مش بس مرور…
إنتِ الحكاية اللي ما بدي نهايتها تخلص 💖
 🤍`;

/* 🎵 تشغيل الموسيقى بالنص */
function startMusic(){
    audio.volume = 0;
    audio.play();

    let v = 0;
    let fade = setInterval(()=>{
        if(v < 0.6){
            v += 0.03;
            audio.volume = v;
        } else {
            clearInterval(fade);
        }
    },150);
}

/* ✍️ typing */
function typeWriter(){

    if(!musicStarted && i > message.length * 0.45){
        musicStarted = true;
        startMusic();
    }

    if(i < message.length){
        textEl.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}

setTimeout(typeWriter, 600);

/* ❤️ قلوب */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "%";
    heart.style.fontSize = (15 + Math.random()*20) + "px";
    heart.style.animationDuration = (5 + Math.random()*3) + "s";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),7000);
}
setInterval(createHeart,400);

</script>

</body>
</html>
